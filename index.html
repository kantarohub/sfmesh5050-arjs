<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF Mesh5050 - AR体験</title>
    <!-- 外部CSSの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="welcome-page">

<div class="container">
    <header>
        <h1 class="product-name">SF Mesh 5050</h1>
        <p class="tagline">スマートフォンのカメラでAR体験</p>
    </header>

    <main>
        <section class="how-to">
            <h3>使い方</h3>
            <ol>
                <li>下のボタンを押してカメラを起動します。</li>
                <li>カメラの使用許可を「許可」にしてください。</li>
                <li><strong>下のマーカー</strong>をカメラの枠内に収まるようにかざしてください。</li>
            </ol>

            <!-- 📷 カメラ起動手順の視覚的ガイド（画像2枚） -->
            <div class="ar-guide-container">
                <div class="ar-steps-flex">
                    
                    <!-- ステップ1 -->
                    <div class="ar-step">
                        <p class="ar-step-text">
                            <span class="highlight-badge">STEP 1</span><br>
                            「許可」ボタンをタップします。
                        </p>
                        <div class="ar-guide-img-wrapper">
                            <!-- ※実際の画像パス（例: images/step1.png）に合わせてください -->
                            <img src="images/IMG_camera-git.PNG" alt="カメラ起動ボタンの確認" class="ar-guide-img">
                        </div>
                    </div>

                    <!-- ステップ2 -->
                    <div class="ar-step">
                        <p class="ar-step-text">
                            <span class="highlight-badge">STEP 2</span><br>
                            アクセスの確認画面が出たら、<strong>「Allow」</strong>を選択します。
                        </p>
                        <div class="ar-guide-img-wrapper">
                            <!-- ※実際の画像パス（例: images/step2.png）に合わせてください -->
                            <img src="images/IMG_camera-ip.PNG" alt="カメラアクセス許可の確認" class="ar-guide-img">
                        </div>
                    </div>

                </div>
            </div>
            <!-- ガイドここまで -->

            <!-- マーカー画像表示エリア -->
            <div class="marker-preview">
                <p>対象のマーカー：</p>
                <img src="images/pattern-qr_sfmesh5050_site.png" alt="ARマーカー" class="marker-img">
                <p class="marker-tip">※この画像を印刷するか、別の画面に表示して読み取ってください。</p>
            </div>
        </section>

        <a href="ar.html" class="start-btn">ARカメラを起動する</a>
    </main>

    <footer>
        <p>&copy; 2026 3i.野村貫太郎事務所</p>
    </footer>
</div>

</body>
</html>
