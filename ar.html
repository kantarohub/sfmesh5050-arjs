<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SFmesh AR marker</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs>
      
      <!-- 1. 外部ファイルの定義（プリロード） -->
      <a-assets>
        <a-asset-item id="my-model" src="images/3dmodelingmesh5050.glb"></a-asset-item>
      </a-assets>

      <!-- 2. 自作マーカーの設定 -->
      <a-marker type="pattern" url="pattern-qr_sfmesh5050_site.patt">
        
        <!-- 3. 自作3Dモデルを表示 -->
        <a-gltf-model 
          src="images/3dmodelingmesh5050.glb" 
          scale="25 25 25"
          position="0 0 0" 
          rotation="0 0 0">
        </a-gltf-model>
        
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
