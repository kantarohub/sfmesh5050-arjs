<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SFmesh AR marker</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- ジェスチャー操作用のスクリプト -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
      gesture-detector>
      
      <!-- 1. 外部ファイルの定義（プリロード） -->
      <a-assets>
        <a-asset-item id="my-model" src="images/3dmodelingmesh5050.glb"></a-asset-item>
      </a-assets>

      <!-- 2. 自作マーカーの設定 -->
      <a-marker 
       type="pattern" 
       url="pattern-qr_sfmesh5050_site.patt"
       raycaster="objects: .clickable" emitevents="true"
       cursor="fuse: false; rayOrigin: mouse;">
        
       <!-- 2. 3Dモデルの設定 -->
       <a-entity
        gltf-model="images/3dmodelingmesh5050.glb"
        class="clickable"
        gesture-handler="rotationFactor: 1"
        position="0 0 0"
        scale="1 1 1">

       </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
    <button class="camera-button" onclick="takePhoto()">
     写真を撮る
    </button>
  </body>
</html>
